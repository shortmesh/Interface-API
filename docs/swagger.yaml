definitions:
  devices.CreateDeviceRequest:
    properties:
      platform:
        example: wa
        type: string
    required:
    - platform
    type: object
  devices.DeleteDeviceRequest:
    properties:
      device_id:
        description: Get the device ID from ListDevices (GET /api/v1/devices) response
        example: "237123456789"
        type: string
      platform:
        description: Get the platform from ListDevices (GET /api/v1/devices) response
        example: wa
        type: string
    required:
    - device_id
    - platform
    type: object
  devices.Device:
    properties:
      device_id:
        example: "237123456789"
        type: string
      platform:
        example: wa
        type: string
    type: object
  devices.DeviceResponse:
    properties:
      message:
        example: Scan the QR code to link your device
        type: string
      qr_code_url:
        example: wss://example.com/api/v1/devices/qr-code?token=mt_xxxxx
        type: string
    type: object
  devices.ErrorResponse:
    properties:
      error:
        example: message
        type: string
    type: object
  devices.SendMessageRequest:
    properties:
      contact:
        example: "1234567890"
        type: string
      platform:
        description: Get the platform from ListDevices (GET /api/v1/devices) response
        example: wa
        type: string
      text:
        example: Hello, World!
        type: string
    required:
    - contact
    - platform
    - text
    type: object
  devices.SendMessageResponse:
    properties:
      message:
        example: Message queued successfully
        type: string
    type: object
  otp.ErrorResponse:
    properties:
      error:
        example: message
        type: string
    type: object
  otp.GenerateOTPRequest:
    properties:
      identifier:
        example: "+237123456780"
        type: string
      platform:
        example: wa
        type: string
      sender:
        example: "237123456789"
        type: string
    required:
    - identifier
    - platform
    - sender
    type: object
  otp.GenerateOTPResponse:
    properties:
      expires_at:
        example: "2026-02-19T20:30:00Z"
        type: string
      message:
        example: OTP sent successfully
        type: string
    type: object
  otp.VerifyOTPRequest:
    properties:
      code:
        example: "123456"
        type: string
      identifier:
        example: "+237123456780"
        type: string
      platform:
        example: wa
        type: string
      sender:
        example: "237123456789"
        type: string
    required:
    - code
    - identifier
    - platform
    - sender
    type: object
  otp.VerifyOTPResponse:
    properties:
      message:
        example: OTP verified successfully
        type: string
    type: object
  services.ErrorResponse:
    properties:
      error:
        example: error message
        type: string
    type: object
  services.ServiceInfo:
    properties:
      description:
        example: One-time password generation and verification service
        type: string
      display_name:
        example: Authy OTP Service
        type: string
      name:
        example: authy
        type: string
    type: object
  services.ServiceStatusResponse:
    properties:
      display_name:
        example: Authy OTP Service
        type: string
      is_enabled:
        example: true
        type: boolean
      is_expired:
        example: false
        type: boolean
      is_subscribed:
        example: true
        type: boolean
      name:
        example: authy
        type: string
    type: object
  services.SubscribeResponse:
    properties:
      client_id:
        example: your_client_id
        type: string
      client_secret:
        example: your_client_secret
        type: string
      message:
        example: Successfully subscribed to service
        type: string
      service_name:
        example: authy
        type: string
    type: object
  services.UserServiceInfo:
    properties:
      client_id:
        example: your_client_id
        type: string
      client_secret:
        example: your_client_secret
        type: string
      created_at:
        example: "2026-03-12T10:00:00Z"
        type: string
      description:
        example: One-time password generation and verification service
        type: string
      display_name:
        example: Authy OTP Service
        type: string
      expires_at:
        example: "2027-03-12T10:00:00Z"
        type: string
      is_enabled:
        example: true
        type: boolean
      is_expired:
        example: false
        type: boolean
      name:
        example: authy
        type: string
    type: object
  tokens.CreateRequest:
    properties:
      expires_at:
        example: "2026-12-31T23:59:59Z"
        type: string
    type: object
  tokens.CreateResponse:
    properties:
      message:
        type: string
      token:
        example: mt_xxxxx
        type: string
    type: object
  tokens.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  users.CreateUserRequest:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: Validpassword123@!
        maxLength: 64
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  users.ErrorResponse:
    properties:
      error:
        example: message
        type: string
    type: object
  users.LoginRequest:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: Validpassword123@!
        type: string
    required:
    - email
    - password
    type: object
  users.UserResponse:
    properties:
      message:
        example: User created successfully
        type: string
      token:
        example: sk_xxxxx
        type: string
    type: object
info:
  contact: {}
  description: API for ShortMesh Interface service
  title: Shortmesh - Interface API
  version: "1.0"
paths:
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate a user and return a session token
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/users.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Login successful
          schema:
            $ref: '#/definitions/users.UserResponse'
        "400":
          description: Invalid request body or validation error
          schema:
            $ref: '#/definitions/users.ErrorResponse'
        "401":
          description: Invalid credentials
          schema:
            $ref: '#/definitions/users.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/users.ErrorResponse'
      summary: User login
      tags:
      - auth
  /api/v1/auth/logout:
    post:
      description: Invalidate the current session token
      parameters:
      - description: 'Session token in format: Bearer sk_xxxxx (obtained from /auth/login
          or /auth/register)'
        in: header
        name: Authorization
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Logout successful
          schema:
            $ref: '#/definitions/users.UserResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/users.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/users.ErrorResponse'
      security:
      - BearerAuth: []
      summary: User logout
      tags:
      - auth
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      description: Create a new user account.
      parameters:
      - description: User creation request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/users.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: User created successfully
          schema:
            $ref: '#/definitions/users.UserResponse'
        "400":
          description: Invalid request body or validation error
          schema:
            $ref: '#/definitions/users.ErrorResponse'
        "409":
          description: User with email already exists
          schema:
            $ref: '#/definitions/users.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/users.ErrorResponse'
      summary: Create a new user
      tags:
      - auth
  /api/v1/devices:
    delete:
      consumes:
      - application/json
      description: Delete a device for the Matrix identity
      parameters:
      - description: 'Matrix token in format: Bearer mt_xxxxx (obtained from /tokens)'
        in: header
        name: Authorization
        type: string
      - description: Device deletion request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/devices.DeleteDeviceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Device deleted successfully
          schema:
            $ref: '#/definitions/devices.DeviceResponse'
        "400":
          description: Invalid request body or validation error
          schema:
            $ref: '#/definitions/devices.ErrorResponse'
        "401":
          description: Invalid or expired matrix token
          schema:
            $ref: '#/definitions/devices.ErrorResponse'
        "403":
          description: Invalid or expired matrix token
          schema:
            $ref: '#/definitions/devices.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/devices.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a device
      tags:
      - devices
    get:
      consumes:
      - application/json
      description: List all devices for the Matrix identity
      parameters:
      - description: 'Matrix token in format: Bearer mt_xxxxx (obtained from /tokens)'
        in: header
        name: Authorization
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of devices
          schema:
            items:
              $ref: '#/definitions/devices.Device'
            type: array
        "401":
          description: Invalid or expired matrix token
          schema:
            $ref: '#/definitions/devices.ErrorResponse'
        "403":
          description: Invalid or expired matrix token
          schema:
            $ref: '#/definitions/devices.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/devices.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List all devices
      tags:
      - devices
    post:
      consumes:
      - application/json
      description: Create a new device for the Matrix identity
      parameters:
      - description: 'Matrix token in format: Bearer mt_xxxxx (obtained from /tokens)'
        in: header
        name: Authorization
        type: string
      - description: Device creation request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/devices.CreateDeviceRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Requested to add device successfully
          schema:
            $ref: '#/definitions/devices.DeviceResponse'
        "400":
          description: Invalid request body or validation error
          schema:
            $ref: '#/definitions/devices.ErrorResponse'
        "401":
          description: Invalid or expired matrix token
          schema:
            $ref: '#/definitions/devices.ErrorResponse'
        "403":
          description: Invalid or expired matrix token
          schema:
            $ref: '#/definitions/devices.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/devices.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a new device
      tags:
      - devices
  /api/v1/devices/{device_id}/message:
    post:
      consumes:
      - application/json
      description: Queue a message to be sent via the specified device
      parameters:
      - description: 'Matrix token in format: Bearer mt_xxxxx (obtained from /tokens)'
        in: header
        name: Authorization
        type: string
      - description: Device ID
        in: path
        name: device_id
        required: true
        type: string
      - description: Message to send
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/devices.SendMessageRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Message queued successfully
          schema:
            $ref: '#/definitions/devices.SendMessageResponse'
        "400":
          description: Invalid request body or validation error
          schema:
            $ref: '#/definitions/devices.ErrorResponse'
        "401":
          description: Invalid or expired matrix token
          schema:
            $ref: '#/definitions/devices.ErrorResponse'
        "403":
          description: Invalid or expired matrix token
          schema:
            $ref: '#/definitions/devices.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/devices.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Send a message via device
      tags:
      - devices
  /api/v1/devices/qr-code:
    get:
      deprecated: true
      description: Establishes a WebSocket connection to stream real-time add devices
        qr-code. Authentication via query parameter 'token' (e.g., wss://api/v1/devices/qr-code?token=mt_xxxxx).
        This endpoint cannot be tested in Swagger UI - use a WebSocket client instead.
      parameters:
      - description: 'Matrix token (obtained from /tokens) - format: mt_xxxxx'
        in: query
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "101":
          description: WebSocket connection established
          schema:
            type: string
        "401":
          description: Missing or invalid matrix token
          schema:
            $ref: '#/definitions/devices.ErrorResponse'
        "403":
          description: Invalid or expired matrix token
          schema:
            $ref: '#/definitions/devices.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/devices.ErrorResponse'
      summary: WebSocket qr-code endpoint (Not executable in Swagger UI)
      tags:
      - devices
  /api/v1/services:
    get:
      description: Get all active services available for subscription
      parameters:
      - description: 'Session token in format: Bearer sk_xxxxx'
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of available services
          schema:
            items:
              $ref: '#/definitions/services.ServiceInfo'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/services.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/services.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List available services
      tags:
      - services
  /api/v1/services/{service_name}/status:
    get:
      description: Check if the authenticated user has subscribed to a specific service
        and its status
      parameters:
      - description: 'Session token in format: Bearer sk_xxxxx'
        in: header
        name: Authorization
        required: true
        type: string
      - description: Service name (e.g., 'authy')
        in: path
        name: service_name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Service status information
          schema:
            $ref: '#/definitions/services.ServiceStatusResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/services.ErrorResponse'
        "404":
          description: Service not found or not subscribed
          schema:
            $ref: '#/definitions/services.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/services.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get service subscription status
      tags:
      - services
  /api/v1/services/{service_name}/subscribe:
    post:
      consumes:
      - application/json
      description: Subscribe the authenticated user to a service with auto-generated
        credentials
      parameters:
      - description: 'Session token in format: Bearer sk_xxxxx'
        in: header
        name: Authorization
        required: true
        type: string
      - description: Service name (e.g., 'authy')
        in: path
        name: service_name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Service subscribed successfully
          schema:
            $ref: '#/definitions/services.SubscribeResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/services.ErrorResponse'
        "404":
          description: Service not found
          schema:
            $ref: '#/definitions/services.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/services.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Subscribe to a service
      tags:
      - services
  /api/v1/services/authy/otp/generate:
    post:
      consumes:
      - application/json
      description: Generate a secure OTP code and send it to the specified identifier
        via the Authy service
      parameters:
      - description: Basic Auth credentials
        in: header
        name: Authorization
        required: true
        type: string
      - description: Matrix token (e.g., mt_xxxxx)
        in: header
        name: X-Matrix-Token
        required: true
        type: string
      - description: OTP generation request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/otp.GenerateOTPRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OTP sent successfully
          schema:
            $ref: '#/definitions/otp.GenerateOTPResponse'
        "400":
          description: Invalid request body or validation error
          schema:
            $ref: '#/definitions/otp.ErrorResponse'
        "403":
          description: Invalid or expired matrix token
          schema:
            $ref: '#/definitions/otp.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/otp.ErrorResponse'
      security:
      - BasicAuth: []
      summary: Generate and send OTP
      tags:
      - services - authy
  /api/v1/services/authy/otp/verify:
    post:
      consumes:
      - application/json
      description: Verify an OTP code for the authenticated user
      parameters:
      - description: Basic Auth credentials
        in: header
        name: Authorization
        required: true
        type: string
      - description: Matrix token (e.g., mt_xxxxx)
        in: header
        name: X-Matrix-Token
        required: true
        type: string
      - description: OTP verification request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/otp.VerifyOTPRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OTP verified successfully
          schema:
            $ref: '#/definitions/otp.VerifyOTPResponse'
        "400":
          description: Invalid request body or validation error
          schema:
            $ref: '#/definitions/otp.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/otp.ErrorResponse'
        "403":
          description: Invalid or expired matrix token
          schema:
            $ref: '#/definitions/otp.ErrorResponse'
        "429":
          description: TooManyRequests
          schema:
            $ref: '#/definitions/otp.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/otp.ErrorResponse'
      security:
      - BasicAuth: []
      summary: Verify OTP
      tags:
      - services - authy
  /api/v1/services/subscriptions:
    get:
      description: Get all services the authenticated user has subscribed to, including
        their status
      parameters:
      - description: 'Session token in format: Bearer sk_xxxxx'
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of user's services
          schema:
            items:
              $ref: '#/definitions/services.UserServiceInfo'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/services.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/services.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List user's subscribed services
      tags:
      - services
  /api/v1/tokens:
    post:
      consumes:
      - application/json
      description: Create a Matrix identity and get a token for Matrix operations
      parameters:
      - description: 'Session token in format: Bearer sk_xxxxx (obtained from /auth/login
          or /auth/register)'
        in: header
        name: Authorization
        type: string
      - description: Optional expiry configuration
        in: body
        name: request
        schema:
          $ref: '#/definitions/tokens.CreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Matrix token created successfully
          schema:
            $ref: '#/definitions/tokens.CreateResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/tokens.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a Matrix token
      tags:
      - tokens
securityDefinitions:
  BasicAuth:
    type: basic
  BearerAuth:
    description: Bearer token authentication (use "Bearer sk_xxxxx" or "Bearer mt_xxxxx")
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
